<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Developer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <span id="nav-logo">—</span>
        <div class="nav-links">
            <a href="#projects">Work</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <main>
        <section id="about" class="hero">
            <div class="hero-left">
                <img id="user-avatar" src="" alt="Avatar" loading="lazy">
            </div>
            <div class="hero-right">
                <h1 id="user-name">Loading</h1>
                <p id="user-bio" class="bio">—</p>
                <div class="stats">
                    <div class="stat">
                        <strong id="repo-count">0</strong>
                        <span>repos</span>
                    </div>
                    <div class="stat">
                        <strong id="follower-count">0</strong>
                        <span>followers</span>
                    </div>
                    <div class="stat">
                        <strong id="following-count">0</strong>
                        <span>following</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="projects">
            <p class="section-label">Selected work</p>
            <div id="project-list" class="project-list"></div>
        </section>

        <section id="contact" class="contact">
            <p class="section-label">Contact</p>
            <a id="contact-btn" href="mailto:hello@example.com" class="contact-link">Get in touch →</a>
        </section>
    </main>

    <footer>
        <span id="footer-name">Developer</span>
        <span>Built with Devfolio</span>
    </footer>

    <script src="js/config.js"></script>
    <script src="script.js"></script>
</body>
</html>
